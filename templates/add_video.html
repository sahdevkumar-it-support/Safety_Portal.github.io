<!DOCTYPE html>
<html>
<head>
<title>Add Video</title>
</head>
<body>

<h2>Add Video</h2>

<form method="POST">

<label>Select Category</label>

<br><br>

<select name="category_id" required>

{% for category in categories %}

<option value="{{ category._id }}">
{{ category.title }}
</option>

{% endfor %}

</select>

<br><br>

<label>Video Title</label>

<br><br>

<input
type="text"
name="title"
required
style="width:500px;"
>

<br><br>

<label>YouTube URL</label>

<br><br>

<input
type="text"
name="youtube_url"
required
style="width:500px;"
>

<br><br>

<button type="submit">
Save Video
</button>

</form>

</body>
</html>
