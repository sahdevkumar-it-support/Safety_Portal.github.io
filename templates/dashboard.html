<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Portal - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

<div class="dashboard-wrapper">
    
    <header class="main-header">
        <div class="header-brand">
            <div class="brand-icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2>Safety Video Portal</h2>
        </div>
        <div class="header-actions">
            <span class="user-welcome">Welcome, <strong>Admin</strong></span>
            <a href="/logout" class="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </a>
        </div>
    </header>

    <main class="main-content">
        
        <section class="stats-section">
            <div class="stat-card category-card">
                <div class="stat-icon">
                    <i class="fa-solid fa-folder-open"></i>
                </div>
                <div class="stat-info">
                    <h3>{{ total_categories }}</h3>
                    <p>Total Categories</p>
                </div>
                <div class="card-glow"></div>
            </div>

            <div class="stat-card video-card">
                <div class="stat-icon">
                    <i class="fa-solid fa-video"></i>
                </div>
                <div class="stat-info">
                    <h3>{{ total_videos }}</h3>
                    <p>Total Videos</p>
                </div>
                <div class="card-glow"></div>
            </div>

            <div class="stat-card user-card">
                <div class="stat-icon">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3>{{ total_users }}</h3>
                    <p>Total Users</p>
                </div>
                <div class="card-glow"></div>
            </div>
        </section>

        <section class="menu-section">
            <h3 class="section-title"><i class="fa-solid fa-star"></i> Quick Management Actions</h3>
            <div class="action-grid">
                
                <a href="/add_category" class="menu-item color-1">
                    <div class="menu-icon"><i class="fa-solid fa-folder-plus"></i></div>
                    <span>Add Category</span>
                </a>

                <a href="/categories" class="menu-item color-2">
                    <div class="menu-icon"><i class="fa-solid fa-folder-tree"></i></div>
                    <span>View Categories</span>
                </a>

                <a href="/add_video" class="menu-item color-3">
                    <div class="menu-icon"><i class="fa-solid fa-square-plus"></i></div>
                    <span>Add Video</span>
                </a>

                <a href="/videos" class="menu-item color-4">
                    <div class="menu-icon"><i class="fa-solid fa-sliders"></i></div>
                    <span>Video Management</span>
                </a>

                <a href="/home" class="menu-item color-5">
                    <div class="menu-icon"><i class="fa-solid fa-circle-play"></i></div>
                    <span>Watch Safety Videos</span>
                </a>

                <a href="/users" class="menu-item color-6">
                    <div class="menu-icon"><i class="fa-solid fa-user-gear"></i></div>
                    <span>Manage Users</span>
                </a>

            </div>
        </section>

    </main>
</div>

</body>
</html>
